services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: eka
      POSTGRES_PASSWORD: eka
      POSTGRES_DB: eka
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://eka:eka@postgres:5432/eka
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: mock
      EMBEDDING_PROVIDER: mock
      UPLOAD_DIR: /data/uploads
      INDEX_DIR: /data/indexes
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "8501:8501"

volumes:
  postgres_data:
